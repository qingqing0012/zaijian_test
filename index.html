<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>你最像《再见爱人》里的谁</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');
@font-face{font-family:'HuimouHandwrite';src:url('/fonts/huimou.ttf?v=2') format('truetype');font-weight:400;font-style:normal;font-display:block;}
*{box-sizing:border-box;margin:0;padding:0;}
:root{ --accent:#c2698f; --accent-soft:#f6e9f0; --bg:#faf5f3; --bg2:#f5ebf1; --card:#fff; --ink:#2a2228; --sub:#8a7a85; --line:#f0e6ec; }
html,body{min-height:100vh;}
body{ font-family:'Noto Sans SC',sans-serif; background:radial-gradient(circle at 30% 12%, var(--bg2), var(--bg)); color:var(--ink); display:flex; justify-content:center; align-items:flex-start; padding:32px 16px; transition:background .5s,color .5s; }
.wrap{width:100%;max-width:580px;margin:0 auto;}
.card{background:var(--card);border-radius:26px;box-shadow:0 10px 50px rgba(120,80,100,0.13);overflow:hidden;animation:rise .6s ease both;}
.theme-hidden .card{box-shadow:0 10px 60px rgba(0,0,0,0.55);}
@keyframes rise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
.home{padding:64px 36px;text-align:center;}
.home .kicker{font-size:13px;letter-spacing:3px;color:var(--accent);margin-bottom:20px;font-weight:500;}
.home h1{font-family:'Noto Serif SC',serif;font-size:33px;font-weight:900;line-height:1.4;margin-bottom:18px;}
.home p{font-size:15px;color:var(--sub);line-height:1.8;margin-bottom:40px;}
.startbtn{background:var(--accent);color:#fff;border:none;padding:16px 48px;font-size:17px;font-weight:500;border-radius:40px;cursor:pointer;font-family:'Noto Sans SC';box-shadow:0 8px 24px rgba(180,100,140,0.3);transition:transform .15s;}
.startbtn:hover{transform:translateY(-2px);}
.quiz{padding:44px 36px 48px;}
.progress-bar{height:6px;background:var(--accent-soft);border-radius:6px;overflow:hidden;margin-bottom:8px;}
.progress-fill{height:100%;background:var(--accent);width:0;transition:width .4s;}
.progress-text{font-size:13px;color:var(--sub);margin-bottom:28px;text-align:right;}
.qtitle{font-family:'Noto Serif SC',serif;font-size:23px;font-weight:600;line-height:1.5;margin-bottom:28px;}
.opts{display:flex;flex-direction:column;gap:13px;}
.opt{text-align:left;background:var(--card);border:1.5px solid var(--line);color:var(--ink);padding:17px 20px;font-size:15.5px;line-height:1.5;border-radius:15px;cursor:pointer;font-family:'Noto Sans SC';transition:all .15s;}
.opt:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateX(3px);}
.r-top{padding:44px 36px 30px;text-align:center;border-bottom:1px solid var(--line);}
.r-tag{display:inline-block;background:var(--accent-soft);color:var(--accent);font-size:12px;letter-spacing:1.5px;padding:6px 16px;border-radius:20px;margin-bottom:20px;font-weight:500;}
.r-emoji{font-size:50px;line-height:1;margin-bottom:16px;}
.r-lead{font-size:14px;color:var(--sub);margin-bottom:8px;letter-spacing:1px;}
.r-name{font-family:'Noto Serif SC',serif;font-size:36px;font-weight:900;margin-bottom:14px;}
.r-sub{font-size:15px;color:var(--accent);font-weight:500;line-height:1.6;padding:0 10px;}
.r-body{padding:32px 36px;font-size:15.5px;line-height:1.9;}
.r-body p{margin:0 0 15px;}
.r-radar{padding:6px 28px 36px;}
.r-radar-title{text-align:center;font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;margin-bottom:4px;}
.r-btns{padding:0 36px 40px;display:flex;flex-direction:column;gap:12px;}
.r-btn{padding:16px;border:none;border-radius:14px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans SC';transition:transform .15s;}
.r-btn-primary{background:var(--accent);color:#fff;}
.r-btn-primary:hover{transform:translateY(-2px);}
.r-btn-ghost{background:transparent;color:var(--sub);border:1.5px solid var(--line);}
.hidden{display:none;}
/* 聊天卡片 */
.chat-header{display:flex;align-items:center;gap:14px;padding:22px 28px;border-bottom:1px solid var(--line);}
.chat-back{background:none;border:none;color:var(--sub);font-size:15px;cursor:pointer;font-family:'Noto Sans SC';padding:0;transition:color .15s;}
.chat-back:hover{color:var(--accent);}
.chat-mentor-name{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;}
.chat-mentor-sub{font-size:13px;color:var(--sub);margin-top:2px;}
.chat-msgs{display:flex;flex-direction:column;gap:14px;padding:24px 28px;max-height:55vh;overflow-y:auto;min-height:220px;}
.chat-msgs::-webkit-scrollbar{width:4px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
.chat-empty{text-align:center;color:var(--sub);font-size:14px;padding:40px 20px;line-height:1.9;}
.chat-msg{max-width:80%;padding:14px 18px;font-size:15px;line-height:1.7;border-radius:18px;word-break:break-word;animation:rise .3s ease both;}
.chat-msg-bot{align-self:flex-start;background:var(--card);border:1.5px solid var(--line);border-bottom-left-radius:6px;}
.chat-msg-user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:6px;}
.chat-typing{align-self:flex-start;display:flex;gap:5px;padding:14px 18px;}
.chat-typing span{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:dotBounce 1.4s infinite ease-in-out both;}
.chat-typing span:nth-child(1){animation-delay:0s;}
.chat-typing span:nth-child(2){animation-delay:.2s;}
.chat-typing span:nth-child(3){animation-delay:.4s;}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.chat-input-area{display:flex;gap:10px;padding:16px 28px 24px;border-top:1px solid var(--line);}
.chat-input{flex:1;padding:14px 18px;border:1.5px solid var(--line);border-radius:24px;font-size:15px;font-family:'Noto Sans SC';color:var(--ink);background:var(--card);outline:none;transition:border-color .15s;}
.chat-input:focus{border-color:var(--accent);}
.chat-input::placeholder{color:var(--sub);}
.chat-send{background:var(--accent);color:#fff;border:none;padding:12px 24px;font-size:15px;font-weight:500;border-radius:24px;cursor:pointer;font-family:'Noto Sans SC';transition:transform .15s;white-space:nowrap;}
.chat-send:hover{transform:translateY(-1px);}
.chat-send:disabled{opacity:.5;cursor:not-allowed;transform:none;}
/* 聊天页导师切换条 */
.mentor-bar{display:flex;gap:6px;padding:14px 28px;overflow-x:auto;border-bottom:1px solid var(--line);-webkit-overflow-scrolling:touch;}
.mentor-bar::-webkit-scrollbar{height:0;}
.mentor-chip{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:7px 14px;border:1.5px solid var(--line);border-radius:18px;background:var(--card);cursor:pointer;font-family:'Noto Sans SC';font-size:13.5px;color:var(--ink);transition:all .15s;white-space:nowrap;}
.mentor-chip:hover{border-color:var(--accent);background:var(--accent-soft);}
.mentor-chip.mentor-active{border-color:var(--accent);background:var(--accent);color:#fff;}
.mentor-chip.mentor-active .mentor-chip-sub{color:rgba(255,255,255,0.7);}
.mentor-chip-emoji{font-size:17px;line-height:1;}
.mentor-chip-info{display:flex;flex-direction:column;}
.mentor-chip-name{font-weight:600;font-family:'Noto Serif SC',serif;}
.mentor-chip-sub{font-size:10.5px;color:var(--sub);margin-top:1px;transition:color .15s;}
/* 复盘 */
.review-btn-header{background:none;border:1.5px solid var(--accent);color:var(--accent);padding:6px 14px;border-radius:14px;font-size:13px;cursor:pointer;font-family:'Noto Sans SC';white-space:nowrap;transition:all .15s;}
.review-btn-header:hover{background:var(--accent);color:#fff;}
.review-panel{display:none;padding:24px 28px;}
.review-waiting{text-align:center;padding:40px 20px;}
.review-waiting-text{font-size:15px;color:var(--sub);margin-bottom:10px;}
.review-waiting-dots{display:flex;gap:5px;justify-content:center;}
.review-waiting-dots span{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:dotBounce 1.4s infinite ease-in-out both;}
.review-waiting-dots span:nth-child(1){animation-delay:0s;}
.review-waiting-dots span:nth-child(2){animation-delay:.2s;}
.review-waiting-dots span:nth-child(3){animation-delay:.4s;}
.review-letter,.review-card{animation:fadeInUp .5s ease both;}
.review-card{animation-delay:.3s;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.review-letter-box{width:100%;max-width:100%;margin:28px auto 36px;padding:0 16px;box-sizing:border-box;background:transparent;border:none;box-shadow:none;overflow:visible;}
.review-card-box{background:var(--card);border:2px solid var(--accent);border-radius:16px;padding:20px;font-size:15px;line-height:1.9;margin-bottom:14px;}
/* —— 复盘信：一页真实信纸 —— */
/* TODO: 后续优化复盘信手写字体，当前 MVP 阶段先使用现有字体方案，不阻塞主流程验证。 */
.review-letter-paper{position:relative;width:min(92vw,680px);max-width:100%;min-height:680px;margin:0 auto;padding:56px 52px 64px;box-sizing:border-box;overflow:hidden;border-radius:8px 14px 10px 12px;border:1px solid rgba(185,160,120,0.28);background:linear-gradient(rgba(255,250,238,0.18),rgba(255,250,238,0.24)),url('./letter-bg.png') center top/100% 100% no-repeat,#f5ecd8;box-shadow:0 18px 42px rgba(91,66,38,0.16),0 4px 10px rgba(91,66,38,0.08),inset 0 0 32px rgba(116,84,45,0.05);transform:none;}
/* 右上角轻微卷边 */
.review-letter-paper::before{content:"";position:absolute;top:0;right:0;width:58px;height:58px;z-index:3;background:linear-gradient(135deg,rgba(255,255,255,0.88) 0%,rgba(246,232,203,0.92) 42%,rgba(190,158,108,0.28) 44%,rgba(255,255,255,0) 46%);clip-path:polygon(100% 0,0 0,100% 100%);box-shadow:-5px 5px 12px rgba(100,75,45,0.10);pointer-events:none;}
/* 纸张旧纸感和边缘层次 */
.review-letter-paper::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(circle at 14% 12%,rgba(120,85,40,0.05),transparent 28%),radial-gradient(circle at 86% 88%,rgba(120,85,40,0.05),transparent 30%),linear-gradient(90deg,rgba(112,80,40,0.05),transparent 8%,transparent 92%,rgba(112,80,40,0.04));}
/* 正文手写体 */
.review-letter-content{position:relative;z-index:2;width:100%;box-sizing:border-box;font-family:'HuimouHandwrite','STKaiti','KaiTi','Songti SC',serif !important;font-size:18px;line-height:2.0;letter-spacing:0.02em;color:#3a2a20;text-align:left;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;text-shadow:0 1px 0 rgba(255,255,255,0.42);}
.review-letter-content p{margin:0 0 24px;}
.review-label{font-size:12px;letter-spacing:1.5px;color:var(--accent);margin-bottom:10px;font-weight:500;}
.review-card-preview{font-size:14.5px;line-height:1.8;color:var(--ink);}
.review-back-row{text-align:center;margin-top:6px;}
.review-back-row button{background:none;border:none;color:var(--sub);font-size:14px;cursor:pointer;font-family:'Noto Sans SC';padding:8px 16px;transition:color .15s;}
.review-back-row button:hover{color:var(--accent);}
/* —— 卡片视觉：文艺质感复古卡片 —— */
.vintage-card-wrapper{background:#C99B8C;border-radius:10px;padding:12px;margin:16px auto 0;width:min(88vw,360px);box-shadow:0 4px 24px rgba(120,80,80,0.18);animation:fadeInUp .55s ease both;animation-delay:.3s;}
.vintage-card{width:100%;aspect-ratio:3/4;min-height:460px;background:url(card-bg.webp) center/cover no-repeat;border-radius:8px;padding:20px 14px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.22),inset 0 -1px 0 rgba(0,0,0,0.07);position:relative;display:flex;align-items:center;justify-content:center;}
.vintage-card-inner{background:rgba(255,248,245,0.84);border-radius:6px;padding:32px 18px 24px;box-shadow:inset 0 0 36px rgba(201,155,140,0.14);width:100%;}
.vintage-card-ornament{text-align:center;margin-bottom:24px;color:#B08072;font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:3px;user-select:none;}
.vintage-card-ornament::before,.vintage-card-ornament::after{content:'';display:inline-block;width:28px;height:1px;background:#C99B8C;vertical-align:middle;margin:0 10px;opacity:0.45;}
.vintage-card-body{font-family:'Noto Serif SC',serif;font-size:15px;line-height:2.05;color:#5A3D30;text-align:justify;word-break:break-word;}
.vintage-card-body p{margin:0 0 14px;}
.vintage-card-body p:last-child{margin-bottom:0;}
.vintage-card-footer{margin-top:26px;text-align:right;font-family:'Noto Serif SC',serif;font-size:12.5px;color:#7A5D50;letter-spacing:2px;user-select:none;}
.vintage-card-download{display:flex;justify-content:center;margin-top:12px;}
.vintage-card-download-btn{background:transparent;border:1.5px solid #C99B8C;color:#8A6D60;padding:8px 24px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all .2s;}
.vintage-card-download-btn:hover{background:#C99B8C;color:#fff;}
/* —— 移动端：复盘信纸适配 —— */
@media(max-width:640px){
.review-letter-box{padding:0 10px;}
.review-letter-paper{width:min(94vw,420px);min-height:620px;padding:42px 28px 52px;border-radius:8px 12px 9px 10px;transform:none;}
.review-letter-paper::before{width:46px;height:46px;}
.review-letter-content{font-size:16px;line-height:1.95;letter-spacing:0.01em;}
}
/* —— 字体强制：复盘信正文及所有子元素 —— */
.review-letter-content,
.review-letter-content * {
  font-family: 'HuimouHandwrite', 'STKaiti', 'KaiTi', 'Songti SC', serif !important;
}
/* —— 恋爱日记 —— */
.diary-entry-btn{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;font-family:'Noto Sans SC';text-decoration:underline;transition:color .15s;}
.diary-entry-btn:hover{color:#a05070;}
.diary-fixed-entry{text-align:center;padding:16px 0 8px;}
.diary-fixed-entry button{background:none;border:1.5px solid var(--line);color:var(--sub);padding:8px 20px;border-radius:18px;font-size:13px;cursor:pointer;font-family:'Noto Sans SC';transition:all .15s;}
.diary-fixed-entry button:hover{border-color:var(--accent);color:var(--accent);}
.diary-section{padding:36px 32px 44px;}
.diary-section h2{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.diary-section .diary-subtitle{font-size:14px;color:var(--sub);margin-bottom:28px;line-height:1.7;}
.diary-list{display:flex;flex-direction:column;gap:14px;}
.diary-item{border:1px solid var(--line);border-radius:14px;padding:18px 20px;transition:all .15s;animation:fadeInUp .35s ease both;}
.diary-item:hover{border-color:#d4b8a0;}
.diary-item-date{font-size:12px;color:var(--sub);margin-bottom:4px;letter-spacing:0.5px;}
.diary-item-mentor{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:6px;font-family:'Noto Serif SC',serif;}
.diary-item-summary{font-size:13.5px;color:var(--ink);line-height:1.75;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.diary-item-actions{display:flex;gap:10px;}
.diary-btn-sm{background:none;border:1px solid var(--line);padding:6px 14px;border-radius:12px;font-size:12.5px;cursor:pointer;font-family:'Noto Sans SC';color:var(--sub);transition:all .15s;}
.diary-btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.diary-btn-sm.diary-btn-danger{color:#c97a7a;border-color:#e8c8c8;}
.diary-btn-sm.diary-btn-danger:hover{background:#c97a7a;color:#fff;border-color:#c97a7a;}
.diary-back-row{text-align:center;margin-top:20px;}
.diary-back-row button{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;font-family:'Noto Sans SC';transition:color .15s;}
.diary-empty,.diary-loading,.diary-error{text-align:center;padding:48px 24px;color:var(--sub);font-size:14px;line-height:1.9;}
.diary-error{color:#c97a7a;}
.diary-detail{padding:0 4px;animation:fadeInUp .4s ease both;}
.diary-detail-header{margin-bottom:20px;}
.diary-detail-header h3{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.diary-detail-date{font-size:12px;color:var(--sub);}
.diary-detail-letter{background:var(--accent-soft);border-radius:14px;padding:24px;font-size:15px;line-height:1.9;color:var(--ink);margin-bottom:16px;}
.diary-detail-card{margin-bottom:16px;}
.diary-card-label{font-size:13px;letter-spacing:1.5px;color:var(--accent);margin-bottom:10px;font-weight:600;font-family:'Noto Serif SC',serif;}
/* —— 观察室文字播客 —— */
.podcast-gen-btn{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:14px;cursor:pointer;font-family:'Noto Sans SC';transition:all .2s;}
.podcast-gen-btn:hover{opacity:.9;transform:translateY(-1px);}
.podcast-gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.podcast-loading{text-align:center;padding:28px 20px 16px;color:var(--sub);font-size:14px;line-height:1.8;}
.podcast-result{animation:fadeInUp .5s ease both;margin-top:16px;}
.podcast-title{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:4px;}
.podcast-guests{text-align:center;font-size:13px;color:var(--sub);margin-bottom:20px;}
.podcast-block{background:#F4EEE0;border-radius:12px;padding:18px 20px;margin-bottom:12px;font-size:14.5px;line-height:1.9;color:#4A2F1E;}
.podcast-block-label{font-size:12px;letter-spacing:1.5px;color:#C99B8C;margin-bottom:8px;font-weight:600;font-family:'Noto Serif SC',serif;}
.podcast-dialogue{background:#F4EEE0;border-radius:12px;padding:20px;margin-bottom:12px;}
.podcast-dialogue-label{font-size:12px;letter-spacing:1.5px;color:#C99B8C;margin-bottom:12px;font-weight:600;font-family:'Noto Serif SC',serif;}
.podcast-line{margin-bottom:10px;font-size:14.5px;line-height:1.85;color:#4A2F1E;}
.podcast-line:last-child{margin-bottom:0;}
.podcast-speaker{font-weight:700;color:#C99B8C;font-family:'Noto Serif SC',serif;}
.podcast-takeaway{background:#C99B8C;color:#fff;border-radius:12px;padding:20px 24px;margin-top:16px;font-family:'Noto Serif SC',serif;font-size:16px;line-height:1.85;text-align:center;letter-spacing:0.03em;}
.podcast-takeaway-label{font-size:11px;letter-spacing:2px;opacity:.7;margin-bottom:8px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="card" id="homeCard">
    <div class="home">
      <div class="kicker">再见爱人 · 关系人格测试</div>
      <h1>在亲密关系里<br>你最像哪一个 TA？</h1>
      <p>18 种关系人格，6 个维度<br>用 18 道题，照见你看待爱的方式</p>
      <button class="startbtn" id="startBtn">开始测试</button>
    </div>
  </div>
  <div class="card hidden" id="quizCard">
    <div class="quiz">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
      <div class="qtitle" id="questionText"></div>
      <div class="opts" id="optionList"></div>
    </div>
  </div>
  <div class="card hidden" id="resultCard">
    <div class="r-top">
      <div class="r-tag" id="rTag"></div>
      <div class="r-emoji" id="rEmoji"></div>
      <div class="r-lead">在亲密关系里，你是</div>
      <div class="r-name" id="rName"></div>
      <div class="r-sub" id="rSub"></div>
    </div>
    <div class="r-body" id="rBody"></div>
    <div class="r-radar">
      <div class="r-radar-title">你的关系人格雷达图</div>
      <div id="rRadar"></div>
    </div>
    <div class="r-btns">
      <button class="r-btn r-btn-primary" id="chatEntryBtn">和导师聊聊</button>
      <button class="r-btn r-btn-ghost" id="shareBtn">分享给朋友</button>
      <button class="r-btn r-btn-ghost" id="restartBtn">重新测试</button>
    </div>
  </div>
  <!-- 聊天卡片 -->
  <div class="card hidden" id="chatCard">
    <div class="chat-header">
      <button class="chat-back" id="chatBackBtn">&larr; 返回</button>
      <div style="flex:1">
        <div class="chat-mentor-name" id="chatMentorName">李松蔚导师</div>

<!-- 数据文件：改文案/题目/坐标/配色都在 data.js -->
<script src="data.js"></script>
<script>
  const homeCard=document.getElementById("homeCard"),quizCard=document.getElementById("quizCard"),resultCard=document.getElementById("resultCard");
  const startBtn=document.getElementById("startBtn"),progressFill=document.getElementById("progressFill"),progressText=document.getElementById("progressText");
  const questionText=document.getElementById("questionText"),optionList=document.getElementById("optionList");
  const restartBtn=document.getElementById("restartBtn"),shareBtn=document.getElementById("shareBtn");
  let currentQuestionIndex=0, dimRaw=[0,0,0,0,0,0];

  function applyTheme(cat){
    const t=themeColors[cat]; const r=document.documentElement.style;
    r.setProperty("--accent",t.accent); r.setProperty("--accent-soft",t.accentSoft);
    r.setProperty("--bg",t.bg); r.setProperty("--bg2",t.bg2); r.setProperty("--card",t.card);
    r.setProperty("--ink",t.ink); r.setProperty("--sub",t.sub); r.setProperty("--line",t.line);
    document.body.classList.remove("theme-hidden"); if(cat==="hidden")document.body.classList.add("theme-hidden");
  }
  function resetState(){dimRaw=[0,0,0,0,0,0];currentQuestionIndex=0;applyTheme("growth");}

  function renderQuestion(i){
    const q=questions[i];
    progressFill.style.width=Math.round(i/questions.length*100)+"%";
    progressText.textContent="第 "+(i+1)+" / "+questions.length+" 题";
    questionText.textContent=q.title; optionList.innerHTML="";
    q.options.forEach(function(opt){
      const b=document.createElement("button"); b.className="opt"; b.textContent=opt.text;
      b.addEventListener("click",function(){
        for(let k=0;k<6;k++)dimRaw[k]+=opt.d[k];
        if(currentQuestionIndex<questions.length-1){currentQuestionIndex++;renderQuestion(currentQuestionIndex);}
        else showResult();
      });
      optionList.appendChild(b);
    });
  }
  function getUserVector(){return dimRaw.map(function(r){let v=3+r/9;return v<1?1:v>5?5:v;});}
  function matchCharacter(u){let best=null,bd=Infinity;for(const n in characterVectors){const v=characterVectors[n];let s=0;for(let i=0;i<6;i++)s+=(u[i]-v[i])*(u[i]-v[i]);if(Math.sqrt(s)<bd){bd=Math.sqrt(s);best=n;}}return best;}
  function getEmoji(name){const m=characterProfiles[name].subtitle.match(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{1F000}-\u{1F0FF}📐🔍🎵🪞🔪🎯🌌🎐🔥🎤🌊🌫🦢🎈🥚🪦🎉🚩]/u);return m?m[0]:"✨";}
  function hexA(hex,a){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');return 'rgba('+parseInt(hex.substr(0,2),16)+','+parseInt(hex.substr(2,2),16)+','+parseInt(hex.substr(4,2),16)+','+a+')';}
  function buildRadar(user){
    const cx=160,cy=160,R=110,n=6,dL=["理性","抽离","表达","自我","清醒","锋利"],dR=["感性","投入","回避","付出","沉溺","温柔"];
    const cs=getComputedStyle(document.body),accent=cs.getPropertyValue("--accent").trim()||"#c2698f",sub=cs.getPropertyValue("--sub").trim();
    const grid=document.body.classList.contains("theme-hidden")?"rgba(255,255,255,0.12)":"#e8dfe6";
    function pt(i,r){const a=-Math.PI/2+i*2*Math.PI/n;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
    let s='<svg viewBox="0 0 320 320" width="100%" style="max-width:330px;display:block;margin:0 auto;">';
    for(let g=1;g<=5;g++){let p=[];for(let i=0;i<n;i++){const q=pt(i,R*g/5);p.push(q[0].toFixed(1)+","+q[1].toFixed(1));}s+='<polygon points="'+p.join(" ")+'" fill="none" stroke="'+grid+'" stroke-width="1"/>';}
    for(let i=0;i<n;i++){const q=pt(i,R);s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'" stroke="'+grid+'" stroke-width="1"/>';}
    let dp=[];for(let i=0;i<n;i++){const q=pt(i,R*user[i]/5);dp.push(q[0].toFixed(1)+","+q[1].toFixed(1));}
    s+='<polygon points="'+dp.join(" ")+'" fill="'+hexA(accent,0.22)+'" stroke="'+accent+'" stroke-width="2"/>';
    for(let i=0;i<n;i++){const q=pt(i,R*user[i]/5);s+='<circle cx="'+q[0].toFixed(1)+'" cy="'+q[1].toFixed(1)+'" r="3.5" fill="'+accent+'"/>';}
    for(let i=0;i<n;i++){const q=pt(i,R+22);s+='<text x="'+q[0].toFixed(1)+'" y="'+q[1].toFixed(1)+'" font-size="11" text-anchor="middle" fill="'+sub+'">'+dL[i]+'·'+dR[i]+'</text>';}
    return s+'</svg>';
  }
  function showResult(){
    progressFill.style.width="100%";
    const user=getUserVector(),top=matchCharacter(user),profile=characterProfiles[top],cat=characterCategory[top];
    applyTheme(cat);
    quizCard.classList.add("hidden");homeCard.classList.add("hidden");resultCard.classList.remove("hidden");
    document.getElementById("rTag").textContent=themeColors[cat].tag;
    document.getElementById("rEmoji").textContent=getEmoji(top);
    document.getElementById("rName").textContent=top+"型";
    let sub=profile.subtitle.replace(/^.*?型[」』]?\s*/,"").replace(/^[^\u4e00-\u9fa5A-Za-z]*/,"").trim();
    document.getElementById("rSub").textContent=sub||profile.subtitle;
    document.getElementById("rBody").innerHTML=profile.paragraphs.map(function(p){return "<p>"+p+"</p>";}).join("");
    document.getElementById("rRadar").innerHTML=buildRadar(user);
    window.scrollTo(0,0);
  }
  startBtn.addEventListener("click",function(){resetState();homeCard.classList.add("hidden");resultCard.classList.add("hidden");quizCard.classList.remove("hidden");renderQuestion(0);window.scrollTo(0,0);});
  restartBtn.addEventListener("click",function(){applyTheme("growth");resultCard.classList.add("hidden");quizCard.classList.add("hidden");homeCard.classList.remove("hidden");resetState();window.scrollTo(0,0);});
  shareBtn.addEventListener("click",function(){alert("截图保存这一页，分享到小红书 / 朋友圈吧～");});

  // ===== 聊天功能 =====
  const chatCard=document.getElementById("chatCard"),chatMsgs=document.getElementById("chatMsgs");
  const chatInput=document.getElementById("chatInput"),chatSendBtn=document.getElementById("chatSendBtn");
  const chatBackBtn=document.getElementById("chatBackBtn"),chatEntryBtn=document.getElementById("chatEntryBtn");
  const chatMentorName=document.getElementById("chatMentorName"),chatMentorSub=document.getElementById("chatMentorSub");
  const mentorBar=document.getElementById("mentorBar");
  let abortController=null;
  let currentConversationId=null;  // 当前导师的 Coze conversation_id
  let currentSessionId=null;       // 当前导师的前端 session_id

  // 获取或生成本地匿名 user_id
  function getOrCreateUserId(){
    const LS_KEY='zaijian_user_id';
    let uid=localStorage.getItem(LS_KEY);
    if(!uid){
      uid='zaijian_'+Date.now()+'_'+Math.random().toString(36).slice(2,10);
      localStorage.setItem(LS_KEY,uid);
    }
    return uid;
  }

  // —— per-mentor 状态持久化 ——
  function getConvMap(){try{return JSON.parse(localStorage.getItem('zaijian_conv_map')||'{}');}catch(e){return{};}}
  function setConvMap(map){localStorage.setItem('zaijian_conv_map',JSON.stringify(map));}
  function getSessMap(){try{return JSON.parse(localStorage.getItem('zaijian_sess_map')||'{}');}catch(e){return{};}}
  function setSessMap(map){localStorage.setItem('zaijian_sess_map',JSON.stringify(map));}
  function getMsgCache(){try{return JSON.parse(localStorage.getItem('zaijian_msg_cache')||'{}');}catch(e){return{};}}
  function setMsgCache(map){localStorage.setItem('zaijian_msg_cache',JSON.stringify(map));}

  function saveMentorState(mentorName){
    if(!mentorName)return;
    var cm=getConvMap();cm[mentorName]=currentConversationId||null;setConvMap(cm);
    var sm=getSessMap();sm[mentorName]=currentSessionId||null;setSessMap(sm);
    // 缓存当前聊天窗口消息
    if(chatMsgs){
      var msgs=[];chatMsgs.querySelectorAll('.chat-msg').forEach(function(m){
        msgs.push({role:m.classList.contains('chat-msg-user')?'user':'assistant',content:m.textContent});
      });
      var mc=getMsgCache();mc[mentorName]=msgs;setMsgCache(mc);
    }
  }

  function loadMentorState(mentorName){
    var cm=getConvMap();var sm=getSessMap();
    currentConversationId=cm[mentorName]||null;
    currentSessionId=sm[mentorName]||crypto.randomUUID();
    if(!sm[mentorName]){sm[mentorName]=currentSessionId;setSessMap(sm);}
  }

  // 从缓存渲染消息（瞬切）
  function renderCachedMessages(mentorName){
    chatMsgs.innerHTML='';
    var mc=getMsgCache();var msgs=mc[mentorName];
    if(msgs&&msgs.length>0){
      msgs.forEach(function(m){addChatMsg(m.role,m.content);});
    }else{
      chatMsgs.innerHTML='<div class="chat-empty">这里是一个安全的空间<br>你想和我聊什么？</div>';
    }
  }

  // 从后端拉取历史并回填（异步，静默修正）
  async function syncChatHistory(mentorName){
    var userId=getOrCreateUserId();
    try{
      var res=await fetch('/api/chat?action=history&user_id='+encodeURIComponent(userId)+'&mentor='+encodeURIComponent(mentorName));
      var data=await res.json();
      if(data.success&&data.messages&&data.messages.length>0){
        // 用后端数据更新缓存
        var msgs=data.messages.map(function(m){return{role:m.role,content:m.content};});
        var mc=getMsgCache();mc[mentorName]=msgs;setMsgCache(mc);
        // 恢复首个 conversation_id（只有首次创建的能延续 Coze 上下文）
        for(var i=0;i<data.messages.length;i++){
          if(data.messages[i].conversation_id){
            var cm=getConvMap();cm[mentorName]=data.messages[i].conversation_id;setConvMap(cm);
            if(currentMentor===mentorName&&!currentConversationId){currentConversationId=data.messages[i].conversation_id;}
            break;
          }
        }
        // 只有当前导师才重绘
        if(currentMentor===mentorName){renderCachedMessages(mentorName);}
      }
    }catch(e){console.error('[chat] 历史同步失败',e);}
  }
  let currentMentor="李松蔚"; // 默认推荐

  // 渲染聊天页导师切换条（5 个 chip，当前选中高亮）
  function renderMentorBar(){
    mentorBar.innerHTML="";
    for(const name in mentors){
      const m=mentors[name];
      const chip=document.createElement("div");
      chip.className="mentor-chip"+(name===currentMentor?" mentor-active":"");
      chip.innerHTML='<span class="mentor-chip-emoji">'+m.emoji+'</span><span class="mentor-chip-info"><span class="mentor-chip-name">'+name+'</span><span class="mentor-chip-sub">'+m.subtitle+'</span></span>';
      chip.addEventListener("click",function(){
        if(name!==currentMentor)switchMentor(name);
      });
      mentorBar.appendChild(chip);
    }
  }

  // 切换导师：保存当前 → 加载目标 → 渲染缓存 → 异步同步历史
  function switchMentor(mentorName){
    if(mentorName===currentMentor)return;
    // 终止请求
    if(abortController){abortController.abort();abortController=new AbortController();}
    // 保存当前导师状态
    saveMentorState(currentMentor);
    // 切换
    currentMentor=mentorName;
    const m=mentors[mentorName];
    chatMentorName.textContent=mentorName+"导师";
    chatMentorSub.textContent=m?m.subtitle:"";
    renderMentorBar();
    // 加载目标导师状态
    loadMentorState(mentorName);
    // 渲染缓存（秒切）
    renderCachedMessages(mentorName);
    chatInput.value="";
    chatSendBtn.disabled=false;
    chatInput.focus();
    // 异步从后端同步历史
    syncChatHistory(mentorName);
  }

  // 结果页 → 聊天页（默认李松蔚）
  chatEntryBtn.addEventListener("click",function(){
    currentMentor="李松蔚";
    chatMentorName.textContent="李松蔚导师";
    chatMentorSub.textContent=mentors["李松蔚"].subtitle;
    resultCard.classList.add("hidden");
    chatCard.classList.remove("hidden");
    renderMentorBar();
    loadMentorState("李松蔚");
    renderCachedMessages("李松蔚");
    chatInput.value="";
    chatSendBtn.disabled=false;
    chatInput.focus();
    syncChatHistory("李松蔚");
    window.scrollTo(0,0);
  });

  // 聊天页 → 返回结果页
  chatBackBtn.addEventListener("click",function(){
    chatCard.classList.add("hidden");
    resultCard.classList.remove("hidden");
    window.scrollTo(0,0);
  });

  // 硬重置当前导师对话（清缓存 + 清 Coze 上下文）
  function resetCurrentMentor(){
    saveMentorState(currentMentor);
    currentConversationId=null;
    currentSessionId=crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2,10);
    var cm=getConvMap();delete cm[currentMentor];setConvMap(cm);
    var sm=getSessMap();sm[currentMentor]=currentSessionId;setSessMap(sm);
    var mc=getMsgCache();delete mc[currentMentor];setMsgCache(mc);
    chatMsgs.innerHTML='<div class="chat-empty">这里是一个安全的空间<br>你想和我聊什么？</div>';
    chatInput.value="";
    chatSendBtn.disabled=false;
    chatInput.focus();
  }

  function addChatMsg(role,text){
    const empty=chatMsgs.querySelector(".chat-empty");
    if(empty)empty.remove();

    const div=document.createElement("div");
    div.className="chat-msg chat-msg-"+(role==="user"?"user":"bot");
    div.textContent=text;
    chatMsgs.appendChild(div);
    chatMsgs.scrollTop=chatMsgs.scrollHeight;
    return div;
  }

  function showChatTyping(){
    const typing=document.createElement("div");
    typing.className="chat-typing";
    typing.id="chatTyping";
    typing.innerHTML="<span></span><span></span><span></span>";
    chatMsgs.appendChild(typing);
    chatMsgs.scrollTop=chatMsgs.scrollHeight;
  }

  function hideChatTyping(){
    const el=document.getElementById("chatTyping");
    if(el)el.remove();
  }

  async function sendChatMessage(){
    const text=chatInput.value.trim();
    if(!text || chatSendBtn.disabled)return;

    addChatMsg("user",text);
    chatInput.value="";
    chatSendBtn.disabled=true;
    showChatTyping();

    try{
      const body={message:text,session_id:currentSessionId,mentor:currentMentor,user_id:getOrCreateUserId()};
      if(currentConversationId)body.conversation_id=currentConversationId;

      const res=await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body),
        signal:abortController?abortController.signal:undefined
      });

      const data=await res.json();
      hideChatTyping();

      if(data.reply){
        addChatMsg("bot",data.reply);
        // 仅在首条消息时保存 conversation_id（Coze 每次返回新 ID，只有首个能延续上下文）
        if(data.conversation_id&&!currentConversationId){currentConversationId=data.conversation_id;var cm=getConvMap();cm[currentMentor]=currentConversationId;setConvMap(cm);}
      }else if(data.error){
        addChatMsg("bot","抱歉，出了点问题："+data.error);
      }else{
        addChatMsg("bot","（机器人没有返回回复，请稍后重试）");
      }
    }catch(err){
      if(err.name==="AbortError")return;
      hideChatTyping();
      addChatMsg("bot","网络错误，请检查网络后重试");
    }

    chatSendBtn.disabled=false;
    chatInput.focus();
  }

  chatSendBtn.addEventListener("click",sendChatMessage);
  chatInput.addEventListener("keydown",function(e){
    if(e.key==="Enter"&&!e.shiftKey){
      e.preventDefault();
      sendChatMessage();
    }
  });

  // ===== 复盘功能 =====
  const reviewStartBtn=document.getElementById("reviewStartBtn");
  const reviewPanel=document.getElementById("reviewPanel");
  const reviewContent=document.getElementById("reviewContent");
  const reviewBackRow=document.getElementById("reviewBackRow");
  const reviewBackBtn=document.getElementById("reviewBackBtn");
  const chatInputArea=document.getElementById("chatInputArea");
  let reviewPollTimer=null;

  // 收集当前对话为文本
  function buildChatHistory(){
    const msgs=chatMsgs.querySelectorAll(".chat-msg");
    let lines=[];
    msgs.forEach(function(m){
      const role=m.classList.contains("chat-msg-user")?"用户":"导师";
      lines.push(role+": "+m.textContent);
    });
    return lines.join("\n");
  }

  // 显示复盘面板（隐藏聊天区）
  function showReviewPanel(){
    chatMsgs.style.display="none";
    chatInputArea.style.display="none";
    reviewPanel.style.display="block";
    reviewContent.innerHTML='';
    reviewBackRow.style.display="none";
  }

  // 隐藏复盘面板（恢复聊天区）
  function hideReviewPanel(){
    chatMsgs.style.display="";
    chatInputArea.style.display="";
    reviewPanel.style.display="none";
    reviewContent.innerHTML='';
  }

  // 显示等待状态
  function showReviewWaiting(){
    reviewContent.innerHTML='<div class="review-waiting"><div class="review-waiting-text">正在生成复盘…<br><span style="font-size:13px;color:var(--sub)">这需要约 90 秒，请耐心等待</span></div><div class="review-waiting-dots"><span></span><span></span><span></span></div></div>';
  }

  // 显示复盘结果（先信后卡）
  function showReviewResult(letter,card){
    reviewContent.innerHTML='<div class="review-letter"><div class="review-label">📜 复盘信</div><div class="review-letter-box"><div class="review-letter-paper"><div class="review-letter-content">'+letter.replace(/\n/g,'<br>')+'</div></div></div></div>';
    reviewPanel.scrollTop=0;

    // 1.5 秒后出现卡片
    if(card){
      setTimeout(function(){
        const cardDiv=document.createElement("div");
        cardDiv.className="review-card";
        cardDiv.innerHTML='<div class="review-label">🃏 你的卡片</div>'
          +'<div class="vintage-card-wrapper" id="vintageCardWrapper">'
          +'<div class="vintage-card" id="vintageCard">'
          +'<div class="vintage-card-inner">'
          +'<div class="vintage-card-ornament">◆&nbsp;&nbsp;关 系 卡 片&nbsp;&nbsp;◆</div>'
          +'<div class="vintage-card-body">'+card.replace(/\n/g,'<br>')+'</div>'
          +'<div class="vintage-card-footer">—— ' + currentMentor + ' · 再见爱人</div>'
          +'</div></div>'
          +'<div class="vintage-card-download"><button class="vintage-card-download-btn" onclick="downloadVintageCard()">↓ 保存卡片</button></div>'
          +'</div>';
        // 存复盘数据供观察室使用
        currentReviewData={session_id:currentSessionId,reflection_letter:letter,card_copy:card};

        // 观察室播客入口
        const podcastRow=document.createElement("div");
        podcastRow.style.cssText="text-align:center;margin:14px 0 8px;animation:fadeInUp .5s ease both;animation-delay:.7s;";
        podcastRow.innerHTML='<button class="podcast-gen-btn" id="podcastReviewBtn" onclick="generatePodcastFromReview()">🎙 生成这次的观察室</button>';
        const podcastReviewResult=document.createElement("div");
        podcastReviewResult.id="podcastReviewResult";

        // 恋爱日记入口
        const diaryRow=document.createElement("div");
        diaryRow.style.cssText="text-align:center;margin-top:18px;animation:fadeInUp .5s ease both;animation-delay:.8s;";
        diaryRow.innerHTML='<span style="font-size:13px;color:var(--sub);">已存入你的恋爱日记</span>&nbsp;&nbsp;<button class="diary-entry-btn" onclick="openDiary()">查看恋爱日记 →</button>';
        reviewContent.appendChild(cardDiv);
        reviewContent.appendChild(podcastRow);
        reviewContent.appendChild(podcastReviewResult);
        reviewContent.appendChild(diaryRow);
        reviewPanel.scrollTop=0;
      },1500);
    }

    reviewBackRow.style.display="block";
  }

  // 显示复盘错误
  function showReviewError(msg){
    reviewContent.innerHTML='<div class="review-waiting"><div class="review-waiting-text" style="color:var(--accent)">复盘生成失败</div><p style="font-size:13px;color:var(--sub);margin-top:8px">'+msg+'</p></div>';
    reviewBackRow.style.display="block";
  }

  // 启动复盘流程
  async function startReview(){
    const history=buildChatHistory();
    if(!history.trim()||history.split("\n").filter(l=>l.trim()).length<2){
      alert("请先和导师聊上一段再复盘哦");
      return;
    }

    showReviewPanel();
    showReviewWaiting();
    reviewStartBtn.disabled=true;

    try{
      // ① 启动异步工作流
      const startRes=await fetch("/api/review",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          session_id:currentSessionId,
          mentor:currentMentor,
          chat_history:history,
          user_id:getOrCreateUserId()
        })
      });
      const startData=await startRes.json();

      if(startData.error){
        showReviewError(startData.error);
        reviewStartBtn.disabled=false;
        return;
      }

      // ② 轮询结果
      pollReview(startData.execute_id);
    }catch(err){
      showReviewError("网络错误，请稍后重试");
      reviewStartBtn.disabled=false;
    }
  }

  function pollReview(executeId){
    let attempts=0;
    const maxAttempts=45; // 45 × 4s = 180s

    function tick(){
      attempts++;
      fetch("/api/review?eid="+encodeURIComponent(executeId)+"&sid="+encodeURIComponent(currentSessionId)+"&mentor="+encodeURIComponent(currentMentor)+"&uid="+encodeURIComponent(getOrCreateUserId()))
        .then(r=>r.json())
        .then(function(data){
          if(data.status==="success"){
            clearInterval(reviewPollTimer);
            reviewPollTimer=null;
            showReviewResult(data.letter,data.card);
            reviewStartBtn.disabled=false;
            return;
          }
          if(data.status==="fail"){
            clearInterval(reviewPollTimer);
            reviewPollTimer=null;
            showReviewError(data.error||"工作流执行失败");
            reviewStartBtn.disabled=false;
            return;
          }
          // status === "running" → 继续等
          if(attempts>=maxAttempts){
            clearInterval(reviewPollTimer);
            reviewPollTimer=null;
            showReviewError("复盘超时，请稍后重试");
            reviewStartBtn.disabled=false;
            return;
          }
        })
        .catch(function(){
          // 网络抖动不中断轮询
          if(attempts>=maxAttempts){
            clearInterval(reviewPollTimer);
            reviewPollTimer=null;
            showReviewError("网络不稳定，复盘中断，请稍后重试");
            reviewStartBtn.disabled=false;
          }
        });
    }

    tick(); // 立即第一次查询
    reviewPollTimer=setInterval(tick,4000);
  }

  // 卡片下载（html2canvas 截图）
function downloadVintageCard(){
  const card=document.getElementById("vintageCard");
  if(!card)return;
  const btn=document.querySelector(".vintage-card-download-btn");
  if(btn)btn.style.display="none";
  html2canvas(card,{scale:2,backgroundColor:"#C99B8C",useCORS:true,allowTaint:false}).then(function(canvas){
    const a=document.createElement("a");
    const name=(document.getElementById("rName")?.textContent||"卡片").replace(/型$/,"");
    a.download="再见爱人-"+name+"卡片.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
    if(btn)btn.style.display="";
  }).catch(function(err){
    console.error("卡片保存失败",err);
    alert("保存失败，请截图保存");
    if(btn)btn.style.display="";
  });
}

reviewStartBtn.addEventListener("click",startReview);
  reviewBackBtn.addEventListener("click",function(){
    if(reviewPollTimer){
      clearInterval(reviewPollTimer);
      reviewPollTimer=null;
    }
    hideReviewPanel();

  // ===== 恋爱日记 =====
  const diaryCard=document.getElementById("diaryCard"),diarySection=document.getElementById("diarySection");
  let currentDiaryItem=null;
  let currentReviewData=null;
  let podcastPollTimer=null;

  function openDiary(){
    homeCard.classList.add("hidden");quizCard.classList.add("hidden");resultCard.classList.add("hidden");chatCard.classList.add("hidden");
    diaryCard.classList.remove("hidden");
    loadDiaryEntries();
    window.scrollTo(0,0);
  }

  function closeDiary(){
    diaryCard.classList.add("hidden");
    homeCard.classList.remove("hidden");
    window.scrollTo(0,0);
  }

  async function loadDiaryEntries(){
    const userId=getOrCreateUserId();
    diarySection.innerHTML='<div class="diary-loading">正在翻开你的恋爱日记…</div>';

    try{
      const res=await fetch("/api/diary?user_id="+encodeURIComponent(userId));
      const data=await res.json();

      if(!data.success){
        diarySection.innerHTML='<div class="diary-error">恋爱日记暂时没有打开成功<br><span style="font-size:12px;">请稍后再试</span></div>';
        console.error("[diary] 加载失败",data.error);
        return;
      }

      if(!data.items||data.items.length===0){
        renderDiaryEmpty();
        return;
      }

      renderDiaryList(data.items);
    }catch(err){
      diarySection.innerHTML='<div class="diary-error">恋爱日记暂时没有打开成功<br><span style="font-size:12px;">请稍后再试</span></div>';
      console.error("[diary] 网络错误",err);
    }
  }

  function renderDiaryEmpty(){
    diarySection.innerHTML=''
      +'<h2>恋爱日记</h2>'
      +'<p class="diary-subtitle">每一次复盘，都会在这里留下你关系里的一个节点。</p>'
      +'<div class="diary-empty">还没有恋爱日记。<br>完成一次聊天复盘后，这里会自动留下你的关系记录。</div>'
      +'<div class="diary-back-row"><button onclick="closeDiary()">← 返回首页</button></div>';
  }

  function renderDiaryList(items){
    let html='<h2>恋爱日记</h2><p class="diary-subtitle">每一次复盘，都会在这里留下你关系里的一个节点。</p><div class="diary-list">';

    items.forEach(function(item,i){
      const created=(item.created_at?new Date(item.created_at):new Date());
      const dateStr=created.getFullYear()+"年"+(created.getMonth()+1)+"月"+created.getDate()+"日 "+String(created.getHours()).padStart(2,"0")+":"+String(created.getMinutes()).padStart(2,"0");
      const mentor=item.mentor_name||"关系导师";
      const letter=item.reflection_letter||"";
      const card=item.card_copy||"";
      const summary=letter.substring(0,80)+(letter.length>80?"…":"");

      html+='<div class="diary-item" style="animation-delay:'+(i*0.06)+'s">'
        +'<div class="diary-item-date">'+dateStr+'</div>'
        +'<div class="diary-item-mentor">'+mentor+'</div>'
        +'<div class="diary-item-summary">'+(summary||card||"这是一条关系复盘记录。")+'</div>'
        +'<div class="diary-item-actions">'
        +'<button class="diary-btn-sm" onclick="renderDiaryDetail('+JSON.stringify(item).replace(/"/g,"&quot;")+')">查看这次复盘</button>'
        +'<button class="diary-btn-sm diary-btn-danger" onclick="deleteDiaryEntry(\''+item.id+'\')">删除</button>'
        +'</div></div>';
    });

    html+='</div><div class="diary-back-row"><button onclick="closeDiary()">← 返回首页</button></div>';
    diarySection.innerHTML=html;
  }

  function renderDiaryDetail(item){
    currentDiaryItem=item;
    const created=(item.created_at?new Date(item.created_at):new Date());
    const dateStr=created.getFullYear()+"年"+(created.getMonth()+1)+"月"+created.getDate()+"日 "+String(created.getHours()).padStart(2,"0")+":"+String(created.getMinutes()).padStart(2,"0");
    const mentor=item.mentor_name||"关系导师";
    const letter=item.reflection_letter||"";
    const card=item.card_copy||"";
    const hasPodcast=!!(item.podcast_content);

    let html='<div class="diary-detail">'
      +'<div class="diary-detail-header">'
      +'<h3>'+mentor+'写给你的复盘信</h3>'
      +'<div class="diary-detail-date">'+dateStr+'</div>'
      +'</div>';

    // 关系记忆卡 — 结构化
    if(card){
      var cardTitle=item.card_title||"这一次，我看见了自己的在意";
      var keywords=item.keywords||"";
      var userQuote=item.user_quote||"本次复盘暂未提取到原话";
      var mentorQuote=card;
      html+='<div class="diary-card-label">🃏 关系记忆卡</div>'
        +'<div class="diary-detail-card">'
        +'<div class="vintage-card-wrapper" style="margin:0 auto;">'
        +'<div class="vintage-card">'
        +'<div class="vintage-card-inner">'
        +'<div class="vintage-card-ornament">◆&nbsp;&nbsp;关 系 记 忆 卡&nbsp;&nbsp;◆</div>'
        +'<div style="font-family:\'Noto Serif SC\',serif;font-size:17px;font-weight:700;color:#3a2a20;text-align:center;margin-bottom:14px;">'+cardTitle+'</div>'
        +'<div style="font-size:12px;color:var(--sub);text-align:center;margin-bottom:18px;">'+dateStr+'&nbsp;&nbsp;·&nbsp;&nbsp;本章导师：'+mentor+'</div>';
      if(keywords){
        html+='<div style="margin-bottom:12px;"><span style="font-size:11px;color:var(--sub);letter-spacing:1px;">关键词</span><br><span style="font-size:13px;color:#7A5D50;">'+keywords+'</span></div>';
      }
      html+='<div style="margin-bottom:12px;"><span style="font-size:11px;color:var(--sub);letter-spacing:1px;">我说出口的一句话</span><br><span style="font-size:14px;color:#5A3D30;font-family:\'Noto Serif SC\',serif;line-height:1.8;">“'+userQuote+'”</span></div>'
        +'<div style="margin-bottom:4px;"><span style="font-size:11px;color:var(--sub);letter-spacing:1px;">导师留下的一句话</span><br><span style="font-size:15px;color:#3a2a20;font-family:\'Noto Serif SC\',serif;line-height:1.9;">'+mentorQuote+'</span></div>'
        +'<div class="vintage-card-footer">—— '+mentor+' · 再见爱人</div>'
        +'</div></div></div></div>';
    }

    // 导师信
    if(letter){
      html+='<div class="diary-card-label" style="margin-top:20px;">📜 '+mentor+'写给你的一封信</div>'
        +'<div class="diary-detail-letter">'+letter.replace(/\n/g,"<br>")+'</div>';
    }

    // 观察室
    if(hasPodcast){
      html+='<div class="diary-card-label" style="margin-top:20px;">🎙 观察室文字播客</div>';
      if(item.podcast_title) html+='<div class="podcast-title">'+item.podcast_title+'</div>';
      if(item.podcast_guests) html+='<div class="podcast-guests">本期嘉宾：'+item.podcast_guests+'</div>';
      if(item.podcast_content){
        html+='<div class="podcast-dialogue"><div class="podcast-dialogue-label">讨论实录</div>';
        const lines=item.podcast_content.split("\n");
        for(var i=0;i<lines.length;i++){
          var line=lines[i].trim();if(!line)continue;
          var ci=line.indexOf("：");if(ci===-1)ci=line.indexOf(":");
          if(ci>-1){
            html+='<div class="podcast-line"><span class="podcast-speaker">'+line.substring(0,ci).trim()+'：</span>'+line.substring(ci+1).trim()+'</div>';
          }else{html+='<div class="podcast-line">'+line+'</div>';}
        }
        html+='</div>';
      }
      if(item.podcast_takeaway){
        html+='<div class="podcast-takeaway"><div class="podcast-takeaway-label">✦ 本期金句</div>'+item.podcast_takeaway+'</div>';
      }
    }else{
      html+='<div style="text-align:center;margin:20px 0 12px;">'
        +'<button class="podcast-gen-btn" id="podcastGenBtn" onclick="generatePodcast({diaryId:\''+item.id+'\'})">🎙 进入观察室，听听他们怎么说</button>'
        +'</div>'
        +'<div class="podcast-result" id="podcastResult"></div>';
    }

    html+='<div class="diary-item-actions" style="margin-top:20px;">'
      +'<button class="diary-btn-sm diary-btn-danger" onclick="deleteDiaryEntry(\''+item.id+'\')">删除这条记录</button>'
      +'</div>'
      +'<div class="diary-back-row"><button onclick="loadDiaryEntries()">← 返回恋爱日记</button></div>'
      +'</div>';

    diarySection.innerHTML=html;
    diarySection.scrollTop=0;
  }

  function deleteDiaryEntry(id){
    if(!confirm("确认删除这条恋爱日记吗？删除后无法恢复。"))return;

    const userId=getOrCreateUserId();
    fetch("/api/diary?id="+encodeURIComponent(id)+"&user_id="+encodeURIComponent(userId),{method:"DELETE"})
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.success){
          loadDiaryEntries();
        }else{
          alert("删除失败，请稍后再试");
          console.error("[diary] 删除失败",data.error);
        }
      })
      .catch(function(err){
        alert("删除失败，请稍后再试");
        console.error("[diary] 删除网络错误",err);
      });
  }

  // 保存播客到恋爱日记
  async function savePodcastToDiary(diaryId,data){
    var userId=getOrCreateUserId();
    try{
      await fetch("/api/diary",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          action:"save_podcast",
          id:diaryId,
          user_id:userId,
          podcast_title:data.title||"",
          podcast_content:data.dialogue||"",
          podcast_guests:data.mentors_used||"",
          podcast_takeaway:data.takeaway||""
        })
      });
    }catch(e){console.error("[podcast] 保存失败",e);}
  }

  // ===== 观察室文字播客 =====
  function generatePodcastFromReview(){
    if(!currentReviewData||!currentReviewData.session_id){
      alert("缺少对话记录，无法生成观察室");
      return;
    }
    generatePodcast({
      session_id:currentReviewData.session_id,
      reflection_letter:currentReviewData.reflection_letter||"",
      card_copy:currentReviewData.card_copy||"",
      btnId:"podcastReviewBtn",
      resultId:"podcastReviewResult"
    });
  }

  async function generatePodcast(data){
    let sid,refLetter,cardCopy,btnId,resultId,diaryId;
    const fallbackItem=currentDiaryItem;

    if(data){
      sid=data.session_id||(fallbackItem?fallbackItem.session_id:null);
      refLetter=data.reflection_letter||(fallbackItem?fallbackItem.reflection_letter:"");
      cardCopy=data.card_copy||(fallbackItem?fallbackItem.card_copy:"");
      btnId=data.btnId||"podcastGenBtn";
      resultId=data.resultId||"podcastResult";
      diaryId=data.diaryId||(fallbackItem?fallbackItem.id:null);
    }else{
      const item=currentDiaryItem;
      if(!item||!item.session_id){
        alert("缺少对话记录，无法生成观察室");
        return;
      }
      sid=item.session_id;
      refLetter=item.reflection_letter||"";
      cardCopy=item.card_copy||"";
      btnId="podcastGenBtn";
      resultId="podcastResult";
      diaryId=item.id||null;
    }

    const btn=document.getElementById(btnId);
    const result=document.getElementById(resultId);
    if(btn){btn.disabled=true;btn.textContent="观察室正在讨论中…";}
    if(result)result.innerHTML='<div class="podcast-loading">🎙 观察室正在讨论中…<br><span style="font-size:12px;">这需要约 40-60 秒，请耐心等待</span></div>';

    // 清理上一次轮询
    if(podcastPollTimer){clearInterval(podcastPollTimer);podcastPollTimer=null;}

    try{
      const startRes=await fetch("/api/podcast",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          session_id:sid,
          reflection_letter:refLetter,
          card_copy:cardCopy
        })
      });
      const startData=await startRes.json();

      if(startData.error){
        if(result)result.innerHTML='<div class="podcast-loading" style="color:#c97a7a;">生成失败：'+startData.error+'</div>';
        if(btn){btn.disabled=false;btn.textContent="🎙 生成这次的观察室";}
        return;
      }

      pollPodcast(startData.execute_id,btn,result,diaryId);
    }catch(err){
      if(result)result.innerHTML='<div class="podcast-loading" style="color:#c97a7a;">网络错误，请稍后重试</div>';
      if(btn){btn.disabled=false;btn.textContent="🎙 生成这次的观察室";}
      console.error("[podcast] 启动失败",err);
    }
  }

  function pollPodcast(executeId,btn,result,diaryId){
    let attempts=0;
    const maxAttempts=45;

    function tick(){
      attempts++;
      fetch("/api/podcast?execute_id="+encodeURIComponent(executeId))
        .then(function(r){return r.json();})
        .then(function(data){
          if(data.status==="success"){
            clearInterval(podcastPollTimer);
            podcastPollTimer=null;
            renderPodcastResult(data,result);
            // 有 diaryId 时自动保存播客
            if(diaryId){savePodcastToDiary(diaryId,data);}
            if(btn){btn.style.display="none";}
            return;
          }
          if(data.status==="fail"){
            clearInterval(podcastPollTimer);
            podcastPollTimer=null;
            if(result)result.innerHTML='<div class="podcast-loading" style="color:#c97a7a;">生成失败：'+(data.error||"未知错误")+'</div>';
            if(btn){btn.disabled=false;btn.textContent="🎙 重新生成";}
            return;
          }
          if(attempts>=maxAttempts){
            clearInterval(podcastPollTimer);
            podcastPollTimer=null;
            if(result)result.innerHTML='<div class="podcast-loading" style="color:#c97a7a;">生成超时，请稍后重试</div>';
            if(btn){btn.disabled=false;btn.textContent="🎙 重新生成";}
            return;
          }
        })
        .catch(function(){
          if(attempts>=maxAttempts){
            clearInterval(podcastPollTimer);
            podcastPollTimer=null;
            if(result)result.innerHTML='<div class="podcast-loading" style="color:#c97a7a;">网络不稳定，请稍后重试</div>';
            if(btn){btn.disabled=false;btn.textContent="🎙 重新生成";}
          }
        });
    }

    tick();
    podcastPollTimer=setInterval(tick,4000);
  }

  function renderPodcastResult(data,result){
    if(!result)return;

    let html='<div class="podcast-result">';

    // title
    if(data.title){
      html+='<div class="podcast-title">'+data.title+'</div>';
    }

    // mentors_used
    if(data.mentors_used){
      html+='<div class="podcast-guests">本期嘉宾：'+data.mentors_used+'</div>';
    }

    // opening
    if(data.opening){
      html+='<div class="podcast-block"><div class="podcast-block-label">开场</div>'+data.opening.replace(/\n/g,"<br>")+'</div>';
    }

    // dialogue — 对话样式
    if(data.dialogue){
      html+='<div class="podcast-dialogue"><div class="podcast-dialogue-label">讨论实录</div>';
      const lines=data.dialogue.split("\n");
      for(var i=0;i<lines.length;i++){
        var line=lines[i].trim();
        if(!line)continue;
        var colonIdx=line.indexOf("：");
        if(colonIdx===-1)colonIdx=line.indexOf(":");
        if(colonIdx>-1){
          var speaker=line.substring(0,colonIdx).trim();
          var content=line.substring(colonIdx+1).trim();
          html+='<div class="podcast-line"><span class="podcast-speaker">'+speaker+'：</span>'+content+'</div>';
        }else{
          html+='<div class="podcast-line">'+line+'</div>';
        }
      }
      html+='</div>';
    }

    // closing
    if(data.closing){
      html+='<div class="podcast-block"><div class="podcast-block-label">收束</div>'+data.closing.replace(/\n/g,"<br>")+'</div>';
    }

    // takeaway
    if(data.takeaway){
      html+='<div class="podcast-takeaway"><div class="podcast-takeaway-label">✦ 本期金句</div>'+data.takeaway+'</div>';
    }

    html+='</div>';
    result.innerHTML=html;
  }
</script>
